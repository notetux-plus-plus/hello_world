name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    # Runner: ubuntu-22.04 (20.04 runners are deprecated/unavailable on GitHub).
    # Container: ubuntu:20.04 → glibc 2.31 baseline so the .so loads on any distro
    # with glibc >= 2.31 (Ubuntu 20.04+, Debian 11+, Fedora 33+, openSUSE 15.3+).
    runs-on: ubuntu-22.04
    container: ubuntu:20.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            gcc make pkg-config libgtk-3-dev

      - name: Build
        run: make

      - name: Verify dynamic dependencies
        # Must only reference: libgtk-3, libgdk-3, libglib, libc, libm — nothing distro-specific.
        run: ldd HelloPlugin/HelloPlugin.so

      - name: Compute SHA-256
        run: sha256sum HelloPlugin/HelloPlugin.so | tee HelloPlugin/HelloPlugin.so.sha256

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HelloPlugin/HelloPlugin.so
            HelloPlugin/HelloPlugin.so.sha256
